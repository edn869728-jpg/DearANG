<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有你的時光｜Memory World</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:"Noto Sans TC";
  overflow:hidden;
}

/* 🌆 主世界 */
#world{
  position:relative;
}

/* 街景背景 */
#bg{
  width:100%;
  height:100vh;
  object-fit:cover;
}

/* 🧭 點擊區 */
.hotspot{
  position:absolute;
  opacity:0;
}

/* 五大建築位置 */
#h1{top:32%;left:4%;width:18%;height:45%;}
#h2{top:28%;left:22%;width:18%;height:52%;}
#h3{top:30%;left:40%;width:18%;height:48%;}
#h4{top:36%;left:58%;width:18%;height:44%;}
#h5{top:40%;left:76%;width:18%;height:40%;}

/* 🧾 頁面 */
.page{
  position:fixed;
  inset:0;
  background:#0b0b0c;
  color:#fff;
  display:none;
  padding:18px;
  overflow:auto;
}

.back{
  color:#aaa;
  margin-bottom:10px;
  cursor:pointer;
}

.card{
  background:#1b1b20;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
}

button{
  padding:10px 14px;
  border-radius:999px;
  border:0;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- 🌆 主世界 -->
<div id="world">

  <!-- 你的街景圖 -->
  <img id="bg" src="https://your-image-url.jpg">

  <!-- 🧭 建築 -->
  <div class="hotspot" id="h1" onclick="openPage('video')"></div>
  <div class="hotspot" id="h2" onclick="openPage('home')"></div>
  <div class="hotspot" id="h3" onclick="openPage('music')"></div>
  <div class="hotspot" id="h4" onclick="openPage('food')"></div>
  <div class="hotspot" id="h5" onclick="openPage('nav')"></div>

</div>

<!-- 🎬 ① 影片區 -->
<div class="page" id="video">
  <div class="back" onclick="closePage()">← 回去</div>
  <h2>華光相館｜影片區</h2>
  <div class="card">📽 回憶影片</div>
</div>

<!-- 🏠 ② 主頁 -->
<div class="page" id="home">
  <div class="back" onclick="closePage()">← 回去</div>
  <h2>他的家｜主記憶</h2>
  <div class="card">🏠 照片與回憶</div>
</div>

<!-- 🎤 ③ 音樂 -->
<div class="page" id="music">
  <div class="back" onclick="closePage()">← 回去</div>
  <h2>金嗓卡拉OK｜音樂</h2>
  <div class="card">🎤 他唱過的歌</div>
</div>

<!-- 🍔 ④ 食物 -->
<div class="page" id="food">
  <div class="back" onclick="closePage()">← 回去</div>
  <h2>美而美早餐店｜食物記憶</h2>
  <div class="card">🍔 吃過的東西</div>
</div>

<!-- 🧭 ⑤ 導航 -->
<div class="page" id="nav">
  <div class="back" onclick="closePage()">← 回去</div>
  <h2>公路局｜通往他的路</h2>

  <div class="card">
    📍 Google Maps
    <br>
    <button onclick="window.open('https://maps.google.com')">
      開啟導航
    </button>
  </div>

  <div class="card">
    🌆 街景
    <br>
    <button onclick="window.open('https://maps.google.com/?layer=c')">
      進入街景
    </button>
  </div>

</div>

<script>

/* 🧭 打開頁面 */
function openPage(id){
  document.getElementById(id).style.display="block";
}

/* 🔙 關閉頁面 */
function closePage(){
  document.querySelectorAll(".page").forEach(p=>{
    p.style.display="none";
  });
}

</script>

</body>
</html>
