<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>摯愛｜Dear ANG</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#050506;color:#fff7e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
body{display:grid;place-items:center}.loading{font-weight:900;letter-spacing:.12em;opacity:.78}.error{max-width:88vw;line-height:1.7;text-align:center;color:#ffd6d6}
</style>
</head>
<body>
<div class="loading" id="bootStatus">正在進入回憶…</div>
<script>
(async function(){
  const status=document.getElementById('bootStatus');
  function fail(message,error){
    console.error('[DearANG v127]',message,error||'');
    status.className='error';
    status.textContent='頁面修補載入失敗：'+message+'。請重新整理一次。';
  }
  function replaceOne(source,label,find,replacement){
    const first=source.indexOf(find);
    const last=source.lastIndexOf(find);
    if(first<0||first!==last)throw new Error(label+' 比對數量不正確');
    return source.slice(0,first)+replacement+source.slice(first+find.length);
  }
  function replaceRegexOne(source,label,pattern,replacement){
    const matches=source.match(new RegExp(pattern.source,pattern.flags.includes('g')?pattern.flags:pattern.flags+'g'))||[];
    if(matches.length!==1)throw new Error(label+' 比對數量='+matches.length);
    return source.replace(pattern,replacement);
  }
  try{
    const response=await fetch('./index-v126-original.html?v=20260708-v127',{cache:'no-store'});
    if(!response.ok)throw new Error('找不到保留的主頁檔案（'+response.status+'）');
    let html=await response.text();

    html=replaceOne(html,'歌詞時間差',
      'const LYRIC_OFFSET_SECONDS = 8;',
      'const LYRIC_OFFSET_SECONDS = -7;');

    html=replaceRegexOne(html,'彈幕控制',
      /function setupLyricDanmaku\(\)\{[\s\S]*?\n\}\nfunction spawnLyric/,
`function setupLyricDanmaku(){
  const audio=document.getElementById('themeAudio');
  if(!audio || audio.dataset.lyricBound==='1')return;
  audio.dataset.lyricBound='1';
  const reset=()=>{lastLyricIndex=-1;lastAudioTime=audio.currentTime||0;clearLyricLayer();};
  const tick=()=>{
    if(!lyricsEnabled || audio.paused || audio.ended)return;
    const nowTime=audio.currentTime||0;
    if(nowTime < lastAudioTime-.45)reset();
    lastAudioTime=nowTime;
    const t=nowTime + LYRIC_OFFSET_SECONDS;
    let activeIndex=-1;
    for(let i=0;i<LYRIC_LINES.length;i++){
      const line=LYRIC_LINES[i];
      if(t>=line.time && t<(line.end||line.time+4)){activeIndex=i;break;}
    }
    if(activeIndex<0 || activeIndex===lastLyricIndex)return;
    lastLyricIndex=activeIndex;
    spawnLyric(LYRIC_LINES[activeIndex].text);
  };
  audio.addEventListener('timeupdate',tick);
  audio.addEventListener('play',tick);
  audio.addEventListener('playing',tick);
  audio.addEventListener('seeked',reset);
  audio.addEventListener('ended',reset);
  if(window.__dearAngLyricTimer)clearInterval(window.__dearAngLyricTimer);
  window.__dearAngLyricTimer=setInterval(tick,300);
}
function spawnLyric`);

    html=replaceOne(html,'媒體來源去重',
`function getRawItems(g){
  const out=[];
  ['items','files','photos','videos','audios','childrenFiles'].forEach(k=>{
    const v=g&&g[k];
    if(Array.isArray(v))out.push(...v);
  });
  return out;
}`,
`function mediaDedupeKey(it){
  it=it||{};
  const id=String(it.id||it.fileId||it.driveId||'').trim();
  if(id)return 'id:'+id;
  const rawUrl=String(it.streamUrl||it.url||it.webViewUrl||it.downloadUrl||'').trim();
  if(rawUrl){
    const driveMatch=rawUrl.match(/(?:id=|\\/d\\/)([-_a-zA-Z0-9]{12,})/);
    if(driveMatch)return 'drive:'+driveMatch[1];
    return 'url:'+rawUrl.replace(/[?#].*$/,'');
  }
  const name=String(it.name||it.filename||'').trim().toLowerCase();
  const size=String(it.size||it.fileSize||'');
  const mime=String(it.mimeType||it.type||'').trim().toLowerCase();
  const modified=String(it.modifiedTime||it.updatedAt||it.createdTime||'');
  return name?'meta:'+name+'|'+size+'|'+mime+'|'+modified:'';
}
function dedupeMediaItems(items){
  const seen=new Set();
  return (items||[]).filter(it=>{
    const key=mediaDedupeKey(it);
    if(!key)return true;
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  });
}
function getRawItems(g){
  const out=[];
  ['items','files','photos','videos','audios','childrenFiles'].forEach(k=>{
    const v=g&&g[k];
    if(Array.isArray(v))out.push(...v);
  });
  return dedupeMediaItems(out);
}`);

    html=replaceOne(html,'資料夾合併去重',
      'buckets.get(key).items.push(...items);',
      'buckets.get(key).items=dedupeMediaItems(buckets.get(key).items.concat(items));');
    html=replaceOne(html,'資料夾結果去重',
      'let arr=[...buckets.values()].filter(x=>x.items.length);',
      'let arr=[...buckets.values()].map(x=>Object.assign({},x,{items:dedupeMediaItems(x.items)})).filter(x=>x.items.length);');
    html=replaceOne(html,'備援影片去重',
      "arr=[{label:'主資料夾',path:'',items:fallbackItems.filter(it=>matchMediaKind(it,kind))}].filter(x=>x.items.length);",
      "arr=[{label:'主資料夾',path:'',items:dedupeMediaItems(fallbackItems.filter(it=>matchMediaKind(it,kind)))}].filter(x=>x.items.length);");
    html=replaceOne(html,'影片清單去重',
      'function mediaListHtml(list){\n  return `<div class="video-grid">`+list.map(v=>{',
      'function mediaListHtml(list){\n  list=dedupeMediaItems(list);\n  return `<div class="video-grid">`+list.map(v=>{');
    html=replaceOne(html,'歌本清單去重',
      'KTV_SONGS=songs.map((s,i)=>Object.assign({},s,{ktvNo:ktvPadNo(i)}));',
      'KTV_SONGS=dedupeMediaItems(songs).map((s,i)=>Object.assign({},s,{ktvNo:ktvPadNo(i)}));');

    html=replaceRegexOne(html,'相框透明入口',
      /#miniWorld \.mini-world-enter-hotspot\{[\s\S]*?\n\}/,
`#miniWorld .mini-world-enter-hotspot{
  position:absolute!important;
  left:6.4815%!important;
  top:22.6736%!important;
  width:87.9630%!important;
  height:18.6111%!important;
  right:auto!important;
  display:block!important;
  z-index:18!important;
  min-height:0!important;
  padding:0!important;
  margin:0!important;
  border:0!important;
  border-radius:.4%!important;
  background:transparent!important;
  color:transparent!important;
  box-shadow:none!important;
  opacity:1!important;
  cursor:pointer!important;
  touch-action:manipulation!important;
  -webkit-tap-highlight-color:transparent!important;
}`);

    html=replaceOne(html,'相框入口標記',
      '<button class="mini-world-enter-hotspot" type="button" onclick="enterMainWorld()" aria-label="進入富宜路街道"></button>',
      '<button class="mini-world-enter-hotspot" type="button" aria-label="點擊相框裡的小世界，進入富宜路街道" title="進入富宜路街道"></button>');

    html=replaceOne(html,'進街道防重複',
`  window.enterMainWorld = function(e){
    stopEvent(e);
    var mini = $('miniWorld');
    if(mini){
      mini.classList.add('zooming');
      mini.style.pointerEvents = 'none';
      setTimeout(function(){
        mini.classList.add('hidden');
        mini.classList.remove('zooming');
        mini.style.pointerEvents = 'none';
        try{ if(typeof window.centerWorld === 'function') window.centerWorld(); }catch(_){}
        try{ if(typeof window.askVisitorAfterEnterWorld === 'function') window.askVisitorAfterEnterWorld(); }catch(_){}
        cleanBlockingLayers();
      }, 620);
    }else{
      try{ if(typeof window.centerWorld === 'function') window.centerWorld(); }catch(_){}
      try{ if(typeof window.askVisitorAfterEnterWorld === 'function') window.askVisitorAfterEnterWorld(); }catch(_){}
      cleanBlockingLayers();
    }
    return false;
  };`,
`  var enteringStreet = false;
  window.enterMainWorld = function(e){
    stopEvent(e);
    if(enteringStreet)return false;
    enteringStreet=true;
    var mini = $('miniWorld');
    var finish=function(){
      try{ if(typeof window.centerWorld === 'function') window.centerWorld(); }catch(_){}
      try{ if(typeof window.askVisitorAfterEnterWorld === 'function') window.askVisitorAfterEnterWorld(); }catch(_){}
      cleanBlockingLayers();
      setTimeout(function(){enteringStreet=false;},350);
    };
    if(mini){
      mini.classList.add('zooming');
      mini.style.pointerEvents = 'none';
      setTimeout(function(){
        mini.classList.add('hidden');
        mini.classList.remove('zooming');
        mini.style.pointerEvents = 'none';
        finish();
      },620);
    }else finish();
    return false;
  };`);

    html=replaceOne(html,'iPhone 單次點擊',
`  function bindClick(selector, fn){
    document.querySelectorAll(selector).forEach(function(el){
      if(el.__dearAngBoundV126) return;
      el.__dearAngBoundV126 = true;
      el.addEventListener('click', fn, {passive:false});
      el.addEventListener('touchend', fn, {passive:false});
    });
  }`,
`  function bindClick(selector, fn){
    document.querySelectorAll(selector).forEach(function(el){
      if(el.__dearAngBoundV127)return;
      el.__dearAngBoundV127=true;
      el.removeAttribute('onclick');
      el.addEventListener('click',function(e){
        var now=Date.now();
        if(now-(el.__dearAngLastTap||0)<450){stopEvent(e);return false;}
        el.__dearAngLastTap=now;
        return fn.call(this,e);
      },{passive:false});
    });
  }`);

    html=html.replace('<head>','<head>\n<!-- DearANG v127 runtime repair 20260708 -->');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    fail(error.message,error);
  }
})();
</script>
</body>
</html>
