<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dear ANG｜相館摩天輪</title>
  <script src="gallery-wheel-manifest.js"></script>
  <style>
    :root{
      --bg0:#140f19;
      --bg1:#23192b;
      --gold:#f7d694;
      --cream:#fff4dc;
      --pink:#ffb7c8;
      --orange:#ff9d65;
      --brown:#5e3e2e;
      --glass:rgba(255,255,255,.12);
      --glass2:rgba(255,255,255,.18);
      --line:rgba(255,244,220,.28);
      --shadow:0 22px 60px rgba(0,0,0,.42);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --wheel-size:min(86vw, 680px);
      --station-h:118px;
      font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; min-height:100%; background:var(--bg0); color:var(--cream); overflow-x:hidden;}
    body{
      background:
        radial-gradient(circle at 20% 8%, rgba(255,183,200,.22), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(255,157,101,.20), transparent 34%),
        linear-gradient(180deg, var(--bg1), var(--bg0) 54%, #100b12 100%);
    }
    .page{min-height:100svh; padding:calc(18px + var(--safe-top)) 18px calc(22px + var(--safe-bottom)); display:flex; flex-direction:column; gap:12px; position:relative; isolation:isolate;}
    .stars,.stars:before,.stars:after{position:fixed; inset:0; content:""; pointer-events:none; z-index:-2; background-image:radial-gradient(circle, rgba(255,255,255,.8) 0 1px, transparent 1.8px); background-size:58px 58px; opacity:.22; animation:drift 18s linear infinite;}
    .stars:before{background-size:86px 86px; opacity:.16; animation-duration:26s;}
    .stars:after{background-size:128px 128px; opacity:.12; animation-duration:36s;}
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(58px)}}
    header{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; z-index:5;}
    .title-wrap{min-width:0;}
    .eyebrow{font-size:12px; letter-spacing:.16em; color:rgba(255,244,220,.72); text-transform:uppercase; margin-bottom:4px;}
    h1{font-size:clamp(28px,7vw,46px); line-height:1.02; margin:0; letter-spacing:.04em; text-shadow:0 6px 20px rgba(0,0,0,.35);}
    .subtitle{margin:8px 0 0; color:rgba(255,244,220,.78); font-size:14px; line-height:1.7; max-width:640px;}
    .top-actions{display:flex; gap:8px; flex-shrink:0;}
    .icon-btn,.pill-btn{border:1px solid var(--line); background:rgba(255,255,255,.10); color:var(--cream); border-radius:999px; min-height:42px; padding:0 14px; display:inline-flex; align-items:center; justify-content:center; gap:7px; box-shadow:0 8px 24px rgba(0,0,0,.20); backdrop-filter:blur(14px); font-weight:800; cursor:pointer;}
    .icon-btn{width:42px; padding:0; font-size:19px;}
    .pill-btn:active,.icon-btn:active{transform:translateY(1px) scale(.99);}
    .stage{flex:1; min-height:620px; display:grid; place-items:center; position:relative; padding:20px 0 8px;}
    .wheel-area{width:100%; max-width:820px; min-height:calc(var(--wheel-size) + var(--station-h) + 90px); position:relative; display:grid; place-items:center; margin:auto;}
    .moon{position:absolute; top:14px; right:9%; width:86px; height:86px; border-radius:50%; background:radial-gradient(circle at 36% 36%, #fff8d6, #ffe9a8 48%, #e6b96c 100%); box-shadow:0 0 38px rgba(255,221,143,.46); opacity:.95;}
    .moon:after{content:""; position:absolute; left:22px; top:10px; width:78px; height:78px; border-radius:50%; background:rgba(35,25,43,.76);}
    .wheel-shell{position:absolute; top:70px; width:var(--wheel-size); height:var(--wheel-size); border-radius:50%; filter:drop-shadow(0 28px 38px rgba(0,0,0,.36));}
    .wheel-ring{position:absolute; inset:0; border:10px solid rgba(247,214,148,.82); border-radius:50%; box-shadow:inset 0 0 0 3px rgba(94,62,46,.56), 0 0 0 3px rgba(255,255,255,.08);}
    .wheel-ring:before,.wheel-ring:after{content:""; position:absolute; inset:7.5%; border:2px dashed rgba(255,244,220,.30); border-radius:50%;}
    .wheel-ring:after{inset:22%; opacity:.65;}
    .wheel-spin{position:absolute; inset:0; border-radius:50%; transform-origin:50% 50%; will-change:transform;}
    .spoke{position:absolute; left:50%; top:50%; width:50%; height:3px; transform-origin:0 50%; background:linear-gradient(90deg, rgba(247,214,148,.90), rgba(247,214,148,.12)); border-radius:999px;}
    .hub{position:absolute; left:50%; top:50%; width:76px; height:76px; margin:-38px 0 0 -38px; border-radius:50%; background:radial-gradient(circle at 38% 33%, #fff4dc, var(--gold) 43%, #94633d 100%); box-shadow:0 0 0 8px rgba(255,255,255,.08), 0 10px 22px rgba(0,0,0,.32); display:grid; place-items:center; color:#4b2f20; font-weight:1000; letter-spacing:.08em; z-index:3;}
    .cabin{position:absolute; left:50%; top:50%; width:112px; height:136px; margin:-68px 0 0 -56px; transform-origin:50% 50%; border:0; background:transparent; padding:0; cursor:pointer; will-change:transform; z-index:4;}
    .cabin-inner{width:100%; height:100%; border-radius:30px 30px 24px 24px; background:linear-gradient(180deg, rgba(255,244,220,.97), rgba(255,218,178,.96)); border:3px solid rgba(94,62,46,.70); box-shadow:0 14px 24px rgba(0,0,0,.30); overflow:hidden; display:flex; flex-direction:column; transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;}
    .cabin.active .cabin-inner{box-shadow:0 20px 34px rgba(0,0,0,.42), 0 0 0 5px rgba(255,183,200,.24); filter:saturate(1.12) brightness(1.04);}
    .cabin-photo{height:84px; margin:8px 8px 0; border-radius:22px 22px 15px 15px; overflow:hidden; background:linear-gradient(135deg, rgba(255,183,200,.54), rgba(255,157,101,.38)); border:1px solid rgba(94,62,46,.28); display:grid; place-items:center;}
    .cabin-photo img{width:100%; height:100%; object-fit:cover; display:block;}
    .cabin-photo .fallback{font-size:24px; filter:drop-shadow(0 4px 7px rgba(0,0,0,.15));}
    .cabin-title{font-size:12px; color:#513527; font-weight:1000; line-height:1.25; padding:7px 9px 2px; text-align:center; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:36px;}
    .cabin-num{font-size:10px; color:rgba(81,53,39,.70); font-weight:900; letter-spacing:.08em; padding-bottom:6px;}
    .support{position:absolute; top:calc(70px + var(--wheel-size) * .48); width:min(72vw, 520px); height:calc(var(--wheel-size) * .43); pointer-events:none; z-index:-1;}
    .support:before,.support:after{content:""; position:absolute; bottom:0; width:12px; height:100%; border-radius:999px; background:linear-gradient(180deg, rgba(247,214,148,.80), rgba(94,62,46,.95)); transform-origin:50% 100%; box-shadow:0 0 0 2px rgba(255,255,255,.07);}
    .support:before{left:28%; transform:rotate(17deg);}
    .support:after{right:28%; transform:rotate(-17deg);}
    .station{position:absolute; top:calc(70px + var(--wheel-size) + 20px); width:min(86vw, 660px); min-height:var(--station-h); border-radius:34px 34px 22px 22px; background:linear-gradient(180deg, rgba(255,244,220,.96), rgba(255,216,173,.96)); border:3px solid rgba(94,62,46,.64); box-shadow:var(--shadow); color:#503424; padding:18px 18px 16px; text-align:center; overflow:hidden;}
    .station:before{content:""; position:absolute; inset:auto -20px 0; height:28px; background:repeating-linear-gradient(90deg, rgba(255,157,101,.9) 0 34px, rgba(255,183,200,.85) 34px 68px); opacity:.9;}
    .station-sign{position:relative; font-size:22px; line-height:1.2; font-weight:1000; letter-spacing:.08em; margin-bottom:8px;}
    .station-sub{position:relative; color:rgba(80,52,36,.75); line-height:1.65; font-size:13px; font-weight:800;}
    .detail-card{position:fixed; left:14px; right:14px; bottom:calc(14px + var(--safe-bottom)); z-index:30; background:rgba(31,22,37,.78); border:1px solid var(--line); border-radius:28px; box-shadow:0 22px 70px rgba(0,0,0,.48); backdrop-filter:blur(22px); padding:14px; display:grid; grid-template-columns:88px 1fr auto; gap:12px; align-items:center; transform:translateY(140%); opacity:0; transition:transform .32s ease, opacity .32s ease; max-width:760px; margin:0 auto;}
    .detail-card.show{transform:translateY(0); opacity:1;}
    .detail-thumb{width:88px; height:88px; border-radius:22px; overflow:hidden; background:linear-gradient(135deg, rgba(255,183,200,.45), rgba(255,157,101,.42)); border:1px solid var(--line); display:grid; place-items:center;}
    .detail-thumb img{width:100%; height:100%; object-fit:cover;}
    .detail-thumb .fallback{font-size:34px;}
    .detail-title{font-size:17px; line-height:1.25; font-weight:1000; margin:0 0 4px;}
    .detail-text{margin:0; color:rgba(255,244,220,.78); font-size:13px; line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
    .detail-actions{display:flex; flex-direction:column; gap:8px;}
    .mini-btn{border:1px solid rgba(255,244,220,.28); border-radius:999px; background:rgba(255,255,255,.12); color:var(--cream); min-height:38px; padding:0 13px; font-weight:1000; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;}
    .modal{position:fixed; inset:0; z-index:50; background:rgba(9,6,12,.82); backdrop-filter:blur(18px); display:none; align-items:center; justify-content:center; padding:24px 14px calc(24px + var(--safe-bottom));}
    .modal.show{display:flex;}
    .modal-panel{width:min(920px, 100%); max-height:88svh; overflow:auto; border-radius:32px; background:linear-gradient(180deg, rgba(35,25,43,.96), rgba(20,15,25,.96)); border:1px solid var(--line); box-shadow:0 30px 90px rgba(0,0,0,.56); padding:14px;}
    .modal-hero{border-radius:24px; overflow:hidden; min-height:260px; background:linear-gradient(135deg, rgba(255,183,200,.32), rgba(255,157,101,.24)); display:grid; place-items:center;}
    .modal-hero img{width:100%; max-height:58svh; object-fit:contain; display:block;}
    .modal-hero .fallback{font-size:76px; padding:80px 0;}
    .modal-copy{padding:14px 6px 4px;}
    .modal-copy h2{font-size:24px; margin:0 0 8px; line-height:1.25;}
    .modal-copy p{margin:0; color:rgba(255,244,220,.80); line-height:1.75;}
    .modal-top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;}
    .modal-top strong{font-size:13px; color:rgba(255,244,220,.70); letter-spacing:.1em;}
    .film-strip{position:absolute; left:0; right:0; bottom:0; height:44px; pointer-events:none; opacity:.19; background:repeating-linear-gradient(90deg, transparent 0 18px, rgba(255,244,220,.65) 18px 28px, transparent 28px 46px), linear-gradient(180deg, transparent, rgba(0,0,0,.45));}
    @media (max-width:520px){
      :root{--wheel-size:min(93vw, 440px); --station-h:110px;}
      .page{padding-left:12px; padding-right:12px;}
      header{align-items:flex-start;}
      .subtitle{font-size:13px; max-width:280px;}
      .top-actions{flex-direction:column;}
      .wheel-area{min-height:calc(var(--wheel-size) + var(--station-h) + 155px);}
      .wheel-shell{top:96px;}
      .moon{top:70px; width:62px; height:62px; right:3%;}
      .moon:after{width:58px; height:58px; left:17px; top:6px;}
      .cabin{width:82px; height:104px; margin:-52px 0 0 -41px;}
      .cabin-inner{border-radius:23px 23px 18px 18px; border-width:2px;}
      .cabin-photo{height:62px; margin:6px 6px 0; border-radius:17px 17px 12px 12px;}
      .cabin-title{font-size:10px; padding:5px 6px 0; min-height:30px;}
      .cabin-num{display:none;}
      .hub{width:56px; height:56px; margin:-28px 0 0 -28px; font-size:11px;}
      .support{top:calc(96px + var(--wheel-size) * .48);}
      .station{top:calc(96px + var(--wheel-size) + 22px);}
      .station-sign{font-size:19px;}
      .detail-card{grid-template-columns:70px 1fr; border-radius:24px;}
      .detail-thumb{width:70px; height:70px; border-radius:18px;}
      .detail-actions{grid-column:1 / -1; flex-direction:row;}
      .mini-btn{flex:1;}
    }
    

    /* v74：點車廂後先轉到月臺，再顯示回憶；避免點哪裡就硬跳哪裡 */
    #stationLive{display:inline-block;margin-top:3px;color:rgba(80,52,36,.62);font-size:12px;font-weight:1000;letter-spacing:.04em}
    .cabin.arriving .cabin-inner{filter:brightness(1.12) saturate(1.16);box-shadow:0 22px 40px rgba(0,0,0,.44),0 0 0 6px rgba(247,214,148,.28),0 0 28px rgba(255,214,148,.38)}
    @media (prefers-reduced-motion: reduce){.stars,.stars:before,.stars:after{animation:none}.wheel-spin{transition:none!important}}
  </style>
</head>
<body>
  <div class="stars"></div>
  <main class="page">
    <header>
      <div class="title-wrap">
        <div class="eyebrow">Dear ANG Photo Studio</div>
        <h1>我們的留影</h1>
        <p class="subtitle">把相館獨立出來，摩天輪自己慢慢轉。點一個車廂，就打開那一天的照片與回憶。</p>
      </div>
      <div class="top-actions">
        <button class="icon-btn" type="button" id="backBtn" aria-label="回上一頁">←</button>
        <button class="icon-btn" type="button" id="pauseBtn" aria-label="暫停或播放">Ⅱ</button>
      </div>
    </header>

    <section class="stage" aria-label="相館摩天輪">
      <div class="wheel-area">
        <div class="moon" aria-hidden="true"></div>
        <div class="wheel-shell">
          <div class="wheel-ring"></div>
          <div class="wheel-spin" id="wheelSpin" aria-live="polite">
            <div class="hub">ANG</div>
          </div>
        </div>
        <div class="support" aria-hidden="true"></div>
        <div class="station">
          <div class="station-sign">富宜相館 · 摩天輪</div>
          <div class="station-sub">沒事的時候自己繞，想看的時候點一下。回憶不急，我們慢慢看。<br><span id="stationLive">第 01 車廂停在月臺。</span></div>
        </div>
      </div>
    </section>

    <aside class="detail-card" id="detailCard" aria-hidden="true">
      <div class="detail-thumb" id="detailThumb"></div>
      <div>
        <h2 class="detail-title" id="detailTitle">照片標題</h2>
        <p class="detail-text" id="detailText">點擊車廂查看照片。</p>
      </div>
      <div class="detail-actions">
        <button class="mini-btn" type="button" id="openBtn">打開</button>
        <button class="mini-btn" type="button" id="closeDetailBtn">收起</button>
      </div>
    </aside>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="照片回憶">
      <div class="modal-panel">
        <div class="modal-top">
          <strong>PHOTO MEMORY</strong>
          <button class="icon-btn" type="button" id="closeModalBtn" aria-label="關閉">×</button>
        </div>
        <div class="modal-hero" id="modalHero"></div>
        <div class="modal-copy">
          <h2 id="modalTitle">照片標題</h2>
          <p id="modalText">照片說明</p>
        </div>
      </div>
    </div>
    <div class="film-strip" aria-hidden="true"></div>
  </main>

  <script>
  (() => {
    'use strict';

    const fallbackItems = [
      { title:'我們的留影 01', text:'把這張照片放進 assets/photos，再到 gallery-wheel-manifest.js 改路徑。', image:'assets/photos/photo-01.jpg', emoji:'📷' },
      { title:'我們的留影 02', text:'可以放單張照片，也可以把 href 指到另一個相簿頁。', image:'assets/photos/photo-02.jpg', emoji:'🎞️' },
      { title:'我們的留影 03', text:'車廂會自己轉動，點擊會暫停並打開小卡。', image:'assets/photos/photo-03.jpg', emoji:'🌙' },
      { title:'我們的留影 04', text:'如果圖片還沒補上，會先顯示表情符號，不會破版。', image:'assets/photos/photo-04.jpg', emoji:'✨' },
      { title:'我們的留影 05', text:'手機直式畫面會自動縮放成比較穩的尺寸。', image:'assets/photos/photo-05.jpg', emoji:'🎡' },
      { title:'我們的留影 06', text:'之後可以再接回留言、雪花留言或雲端照片資料。', image:'assets/photos/photo-06.jpg', emoji:'💛' },
      { title:'我們的留影 07', text:'這份是獨立 HTML，不會再塞在 index.html 裡。', image:'assets/photos/photo-07.jpg', emoji:'🏠' },
      { title:'我們的留影 08', text:'回上一頁按鈕會優先 history.back，沒有上一頁就回 index.html。', image:'assets/photos/photo-08.jpg', emoji:'🪽' }
    ];

    const items = Array.isArray(window.DEARANG_GALLERY_ITEMS) && window.DEARANG_GALLERY_ITEMS.length
      ? window.DEARANG_GALLERY_ITEMS
      : fallbackItems;

    const wheelSpin = document.getElementById('wheelSpin');
    const detailCard = document.getElementById('detailCard');
    const detailThumb = document.getElementById('detailThumb');
    const detailTitle = document.getElementById('detailTitle');
    const detailText = document.getElementById('detailText');
    const openBtn = document.getElementById('openBtn');
    const closeDetailBtn = document.getElementById('closeDetailBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const backBtn = document.getElementById('backBtn');
    const modal = document.getElementById('modal');
    const modalHero = document.getElementById('modalHero');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const stationLive = document.getElementById('stationLive');

    const cabins = [];
    let selectedIndex = 0;
    let rotation = 0;
    let lastTs = performance.now();
    let paused = false;
    let speed = 0.012; // deg per ms
    let snapAnimating = false;
    let snapAnim = null;

    const makeImage = (src, alt, fallbackEmoji) => {
      const holder = document.createElement('div');
      if (!src) {
        holder.className = 'fallback';
        holder.textContent = fallbackEmoji || '📷';
        return holder;
      }
      const img = new Image();
      img.loading = 'lazy';
      img.decoding = 'async';
      img.alt = alt || '';
      img.src = src;
      img.onerror = () => {
        holder.className = 'fallback';
        holder.textContent = fallbackEmoji || '📷';
        img.remove();
      };
      holder.appendChild(img);
      return holder;
    };

    function buildWheel(){
      const count = Math.max(items.length, 1);
      const spokeCount = Math.max(count, 8);
      for(let i=0;i<spokeCount;i++){
        const spoke = document.createElement('div');
        spoke.className = 'spoke';
        spoke.style.transform = `rotate(${(360/spokeCount)*i}deg)`;
        wheelSpin.appendChild(spoke);
      }

      items.forEach((item, i) => {
        const cabin = document.createElement('button');
        cabin.type = 'button';
        cabin.className = 'cabin';
        cabin.setAttribute('aria-label', item.title || `照片 ${i+1}`);
        cabin.innerHTML = `
          <div class="cabin-inner">
            <div class="cabin-photo"></div>
            <div class="cabin-title"></div>
            <div class="cabin-num">${String(i+1).padStart(2,'0')}</div>
          </div>`;
        cabin.querySelector('.cabin-photo').appendChild(makeImage(item.thumb || item.image, item.title, item.emoji));
        cabin.querySelector('.cabin-title').textContent = item.title || `照片 ${i+1}`;
        cabin.addEventListener('click', () => selectCabin(i, true));
        wheelSpin.appendChild(cabin);
        cabins.push(cabin);
      });
    }

    function layoutCabins(){
      const shell = document.querySelector('.wheel-shell');
      const size = shell.getBoundingClientRect().width || 600;
      const radius = size * 0.43;
      const count = cabins.length || 1;
      let frontIndex = 0;
      let frontScore = -Infinity;
      cabins.forEach((cabin, i) => {
        const base = (360 / count) * i - 90;
        const deg = base + rotation;
        const rad = deg * Math.PI / 180;
        const x = Math.cos(rad) * radius;
        const y = Math.sin(rad) * radius;
        const yRatio = (y / radius + 1) / 2; // top 0, bottom 1
        const scale = 0.76 + yRatio * 0.36;
        const opacity = 0.72 + yRatio * 0.28;
        const z = Math.round(80 + yRatio * 120);
        cabin.style.transform = `translate(${x}px, ${y}px) rotate(${-rotation}deg) scale(${scale})`;
        cabin.style.opacity = opacity.toFixed(3);
        cabin.style.zIndex = z;
        const score = yRatio - Math.abs(x / radius) * 0.12;
        if(score > frontScore){ frontScore = score; frontIndex = i; }
      });
      cabins.forEach((c, i) => c.classList.toggle('active', i === selectedIndex || i === frontIndex));
    }

    function tick(ts){
      const dt = Math.min(48, ts - lastTs);
      lastTs = ts;
      if(!paused && !snapAnimating && !window.matchMedia('(prefers-reduced-motion: reduce)').matches){
        rotation = (rotation + dt * speed) % 360;
      }
      wheelSpin.style.transform = `rotate(${rotation}deg)`;
      layoutCabins();
      requestAnimationFrame(tick);
    }

    function fillThumb(target, item){
      target.innerHTML = '';
      const wrap = makeImage(item.thumb || item.image, item.title, item.emoji);
      target.appendChild(wrap);
    }

    function showCabinDetails(i){
      selectedIndex = i;
      const item = items[i] || items[0];
      cabins.forEach((c,k)=>c.classList.toggle('arriving', k===i));
      detailTitle.textContent = item.title || `照片 ${i+1}`;
      detailText.textContent = item.text || item.description || '這裡可以放照片說明。';
      fillThumb(detailThumb, item);
      detailCard.classList.add('show');
      detailCard.setAttribute('aria-hidden','false');
      openBtn.textContent = item.href ? '前往' : '打開';
      if(stationLive)stationLive.textContent = `第 ${String(i+1).padStart(2,'0')} 車廂已到月臺。`;
    }

    function normalizeDeg(v){
      v = v % 360;
      return v < 0 ? v + 360 : v;
    }

    function shortestDelta(from, to){
      return ((to - from + 540) % 360) - 180;
    }

    function targetRotationForIndex(i){
      const count = cabins.length || 1;
      const step = 360 / count;
      return normalizeDeg(180 - step * i);
    }

    function rotateToCabin(i, cb){
      if(!cabins.length){ cb && cb(); return; }
      if(snapAnim)cancelAnimationFrame(snapAnim);
      snapAnimating = true;
      detailCard.classList.remove('show');
      cabins.forEach((c,k)=>c.classList.toggle('arriving', k===i));
      if(stationLive)stationLive.textContent = `第 ${String(i+1).padStart(2,'0')} 車廂正在進月臺…`;
      const start = normalizeDeg(rotation);
      const target = targetRotationForIndex(i);
      const delta = shortestDelta(start, target);
      const t0 = performance.now();
      const dur = Math.min(1650, Math.max(780, Math.abs(delta) * 7.2));
      function easeOutCubic(t){return 1 - Math.pow(1 - t, 3)}
      function step(now){
        const p = Math.min(1, (now - t0) / dur);
        rotation = normalizeDeg(start + delta * easeOutCubic(p));
        wheelSpin.style.transform = `rotate(${rotation}deg)`;
        layoutCabins();
        if(p < 1){ snapAnim = requestAnimationFrame(step); }
        else{
          rotation = target;
          snapAnimating = false;
          snapAnim = null;
          wheelSpin.style.transform = `rotate(${rotation}deg)`;
          layoutCabins();
          cb && cb();
        }
      }
      snapAnim = requestAnimationFrame(step);
    }

    function selectCabin(i, userAction){
      selectedIndex = i;
      if(userAction){
        paused = true;
        pauseBtn.textContent = '▶';
        rotateToCabin(i, () => showCabinDetails(i));
        return;
      }
      showCabinDetails(i);
    }

    function openSelected(){
      const item = items[selectedIndex] || items[0];
      if(item.href){
        window.location.href = item.href;
        return;
      }
      modalHero.innerHTML = '';
      modalHero.appendChild(makeImage(item.image || item.thumb, item.title, item.emoji || '📷'));
      modalTitle.textContent = item.title || `照片 ${selectedIndex+1}`;
      modalText.textContent = item.text || item.description || '這裡可以放照片說明。';
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(){
      modal.classList.remove('show');
      document.body.style.overflow = '';
    }

    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶' : 'Ⅱ';
    });
    backBtn.addEventListener('click', () => {
      if(history.length > 1) history.back();
      else window.location.href = 'index.html';
    });
    closeDetailBtn.addEventListener('click', () => {
      detailCard.classList.remove('show');
      detailCard.setAttribute('aria-hidden','true');
    });
    openBtn.addEventListener('click', openSelected);
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

    buildWheel();
    rotation = targetRotationForIndex(0);
    wheelSpin.style.transform = `rotate(${rotation}deg)`;
    layoutCabins();
    selectCabin(0, false);
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
