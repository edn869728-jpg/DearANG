<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060506;color:#ffe8bb;font-family:"Noto Serif TC","Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif}button{font:inherit;color:inherit;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center}.app{position:relative;width:min(100vw,56.25vh);height:min(100vh,177.7778vw);max-width:1080px;max-height:1920px;overflow:hidden;background:linear-gradient(180deg,#101b23,#20120d 50%,#050404);box-shadow:0 0 70px rgba(0,0,0,.78)}.app:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 10%,rgba(255,226,160,.5) 0 3px,transparent 4px),radial-gradient(circle at 82% 18%,rgba(255,226,160,.6) 0 2px,transparent 3px),radial-gradient(circle at 58% 30%,rgba(255,226,160,.35) 0 2px,transparent 3px);pointer-events:none}.top{position:absolute;left:30px;right:30px;top:28px;z-index:60;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.title small{display:block;color:#ffd88e;font-weight:1000;letter-spacing:.34em;font-size:18px}.title h1{margin:8px 0 0;font-size:54px;line-height:1.05;color:#fff2c7;text-shadow:0 8px 28px rgba(0,0,0,.65)}.musicBox{pointer-events:auto;display:flex;gap:10px;align-items:center}.round{width:72px;height:72px;border-radius:50%;background:rgba(10,7,6,.55);border:2px solid rgba(255,224,160,.42);box-shadow:0 12px 34px rgba(0,0,0,.4);display:grid;place-items:center;font-size:27px;font-weight:1000}.musicText{padding:10px 14px;border:1px solid rgba(255,224,160,.3);border-radius:999px;background:rgba(8,6,5,.45);font-size:14px;font-weight:900;color:#ffe8bc}.view{position:absolute;inset:0;transition:.55s ease}.view.hidden{opacity:0;pointer-events:none;transform:scale(1.02)}.street{background:linear-gradient(180deg,#223b4d 0 14%,#bd8052 14% 15%,#4b2b1c 15% 55%,#181514 55% 100%)}.sky{position:absolute;left:0;right:0;top:0;height:300px;background:linear-gradient( ,210,115,.08),0 0 36px rgba(255,201,91,.46);display:flex;align-items:center;justify-content:center;text-align:center;color:#fff1c6;text-shadow:0 3px 12px rgba(0,0,0,.72);font-size:28px;font-weight:1000;letter-spacing:.08em}.hotPhoto{left:48px;bottom:430px;width:330px;height:390px;animation:pulse 1.35s infinite}.hotOther{opacity:.45}.hotVideo{left:380px;bottom:440px;width:280px;height:330px}.hotHome{left:670px;bottom:430px;width:350px;height:450px}.hotKtv{left:150px;bottom:820px;width:350px;height:290px}.hotBus{right:48px;bottom:840px;width:360px;height:282px}@keyframes pulse{0%,100%{opacity:.75}50%{opacity:1}}.note{position:absolute;left:44px;right:44px;bottom:40px;z-index:40;padding:22px 26px;border-radius:28px;border:1px solid rgba(255,224,160,.34);background:rgba(9,6,5,.56);backdrop-filter:blur(12px);text-align:center;font-size:24px;font-weight:1000;line-height:1.6}.note b{color:#ffd78e}.wheel{background:radial-gradient(circle at 50% 18%,rgba(255,207,127,.24),transparent 28%),linear-gradient(180deg,#071024,#15112b 44%,#1d1012 74%,#050505)}.wheelHead{position:absolute;left:34px;right:34px;top:150px;z-index:15;text-align:center}.wheelHead h2{margin:0;color:#fff1c6;font-size:60px;letter-spacing:.08em;text-shadow:0 8px 28px rgba(0,0,0,.65)}.wheelHead p{margin:10px 0 0;font-size:22px;color:#ffe3a4;font-weight:900;letter-spacing:.15em}.backBtn{position:absolute;left:34px;top:28px;z-index:70;width:78px;height:78px;border-radius:50%;background:rgba(10,7,6,.55);border:2px solid rgba(255,224,160,.42);font-size:36px;font-weight:1000}.wheelStage{position:absolute;left:50%;top:535px;width:760px;height:760px;transform:translate(-50%,-50%)}.ring{position:absolute;inset:5%;border-radius:50%;border:5px solid rgba(255,207,126,.58);box-shadow:0 0 0 10px rgba(255,207,126,.06),0 0 70px rgba(255,176,80,.32),inset 0 0 80px rgba(255,176,80,.12)}.ring:before,.ring:after{content:"";position:absolute;border-radius:50%;border:2px solid rgba(255,207,126,.24)}.ring:before{inset:8%}.ring:after 4px 34px 8px 8px;background:linear-gradient(180deg,#ffe2a4,#8f4a21 62%,#22100a)}.cabin{position:absolute;left:50%;top:50%;width:132px;height:162px;margin-left:-66px;margin-top:-81px;border:1px solid rgba(255,229,180,.50);border-radius:25px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.20),rgba(255,255,255,.07));box-shadow:0 18px 48px rgba(0,0,0,.48);transition:transform .85s cubic-bezier(.2,.9,.2,1),opacity .85s,filter .85s}.cabin.active{border-color:rgba(255,238,194,.98);box-shadow:0 26px 64px rgba(0,0,0,.60),0 0 46px rgba(255,201,107,.42)}.photo{height:104px;margin:10px;border-radius:17px 17px 10px 10px;display:grid;place-items:center;text-align:center;font-size:18px;font-weight:1000}.label{height:44px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:1000}.cabin.active .label:after{content:"｜開門";color:#ffe2a4}.info{position:absolute;left:50px;right:50px;top:1010px;height:300px;border-radius:34px;background:linear-gradient(180deg,rgba(255,249,236,.98),rgba(255,238,207,.98));color:#332016;padding:38px 42px;box-shadow:0 28px 80px rgba(0,0,0,.48)}.info h3{margin:0;color:#217c79;font-size:48px}.info p{font-size:25px;line-height:1.7;font-weight:800}.mall{position:absolute;left:40px;right:40px;bottom:44px;height:500px}.mallSign{width:620px;margin:0 auto -8px;border-radius:17px 17px 7px 7px;background:linear-gradient(180deg,rgba(115,65,31,.92),rgba(45,24,17,.94));text-align:center;padding:16px;color:#fff0c7;border:1px solid rgba(255,225,160,.42)}.mallSign b{font-size:52px}.build{position:relative;height:360px;display:grid;grid-template-columns:1fr 1.1fr 1.25fr 1.1fr 1fr;gap:6px;align-items:end;padding-bottom:58px}.b{height:190px;background:linear-gradient(180deg,rgba(255,232,177,.18),rgba(52,31,24,.95));border:1px solid rgba(255,221,158,.34);border-radius:22px 22px 0 0}.b:nth-child(2),.b:nth-child(4){height:230px}.b:nth-child(3){height:270px}.entry{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);width:520px;height:66px;border-radius:32px 32px 10px 10px;background:linear-gradient(180deg,rgba(255,228,160,.32),rgba(52,28,19,.96));border:1px solid rgba(255,223,164,.38);display:flex;gap:16px;align-items:center;justify-content:center}.entry button{min-width:146px;height:44px;border-radius:999px;background:linear-gradient(180deg,#9d5a2a,#36160f);font-weight:1000;letter-spacing:.24em}.modal{position:absolute;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(12px)}.modal.open{display:flex}.sheet{width:960px;max-height:78%;overflow:auto;border-radius:40px 40px 0 0;background:linear-gradient(180deg,#17100e,#070606);padding:34px;color:#ffe9c0}.sheet h2{font-size:48px;margin:0}.grid{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.pic{min-height:220px;border-radius:24px;background:linear-gradient(135deg,#63c6b9,#224b57);display:grid;place-items:center;font-size:24px;font-weight:1000}.toast{position:absolute;left:50%;bottom:28px;transform:translateX(-50%) translateY(120px);z-index:120;padding:14px 22px;border-radius:999px;background:rgba(24,14,12,.85);border:1px solid rgba(255,225,160,.3);transition:.35s;font-weight:900}.toast.show{transform:translateX(-50%) translateY(0)}@media(max-width:700px){.app{width:100vw;height:100vh}.title small{font-size:12px}.title h1{font-size:30px}.top{left:14px;right:14px;top:16px}.round{width:48px;height:48px;font-size:20px}.musicText{display:none}.street{transform-origin:top center}.note{font-size:15px;left:16px;right:16px}.wheelHead{top:92px}.wheelHead h2{font-size:32px}.wheelHead p{font-size:13px}.wheelStage{top:37vh;width:min(96vw,480px);height:min(96vw,480px)}.cabin{width:92px;height:118px;margin-left:-46px;margin-top:-59px}.photo{height:75px;font-size:12px}.hub{width:100px;height:100px}.hub strong{font-size:24px}.support{width:28px}.foot{width:min(86vw,430px);height:42px}.boarding{width:150px;height:72px}.boarding:before{font-size:11px}.boarding:after{width:44px;height:38px}.info{left:14px;right:14px;top:calc(37vh + 250px);height:160px;border-radius:22px;padding:20px}.info h3{font-size:24px}.info p{font-size:14px}.mall{left:10px;right:10px;bottom:14px;height:260px}.mallSign{width:78vw;padding:9px}.mallSign b{font-size:26px}.build{height:190px;padding-bottom:36px}.b{height:90px}.b:nth-child(2),.b:nth-child(4){height:120px}.b:nth-child(3){height:140px}.entry{width:72vw;height:40px}.entry button{min-width:78px;height:26px;font-size:12px}.sheet{width:100%;padding:22px}.grid{gap:10px}.pic{min-height:130px}}
</style>
</head>
<body>
<main class="app">
<audio id="themeAudio" src="assets/audio/dear-ang-theme.mp3" loop preload="auto"></audio>
<div class="top"><div class="title"><small>同檔版測試</small><h1 id="mainTitle">富宜路街道</h1></div><div class="musicBox"><button class="round" id="musicBtn">♪</button><div class="musicText" id="musicText">點 ♪ 播放主題曲</div></div></div>
<section class="view street" id="streetView"><div class="sky"></div><div class="shop photoShop"><b>華光相館</b></div><div class="shop videoShop"><b>影音館</b></div><div class="shop homeShop"><b>富宜路86號</b></div><div class="shop ktvShop"><b>卡拉OK</b></div><div class="shop busShop"><b>公路局</b></div><div class="road"></div><button class="hot hotPhoto" id="photoEntry">華光相館<br>進摩天輪相簿</button><button class="hot hotOther hotVideo">影音館</button><button class="hot hotOther hotHome">富宜路86號</button><button class="hot hotOther hotKtv">卡拉 OK</button><button class="hot hotOther hotBus">公路局</button><div class="note">這版是 <b>同一個 HTML</b>：點相館只切畫面，主題曲不會重載、不會中斷。</div></section>
<section class="view wheel hidden" id="wheelView"><button class="backBtn" id="backStreet">←</button><div class="wheelHead"><h2>回憶摩天輪</h2><p>車廂到下面開門，再點一次進相簿</p></div><div class="wheelStage" id="stage"><div class="ring"></div><div class="spokes" id="spokes"></div><div class="support left"></div><div class="support right"></div><div class="foot"></div><div class="hub"><span>♥</span><strong>回憶</strong></div><div class="boarding"></div><div id="cabins"></div></div><article class="info"><h3 id="infoTitle">愛的旅程</h3><p id="infoText">記錄我們一起走過的每個重要時刻。每一張照片，都是愛的證明。</p></article><section class="mall"><div class="mallSign"><b>麗寶 OUTLET</b></div><div class="build"><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div><div class="entry"><button>入口</button><button>出口</button></div></div></section></section>
<div class="modal" id="modal"><div class="sheet"><button class="round" id="closeModal" style="float:right">×</button><h2 id="modalTitle">主題相簿</h2><p id="modalDesc"></p><div class="grid" id="grid"></div></div></div><div class="toast" id="toast">OK</div>
</main>
<script>
(()=>{
const audio=document.getElementById('themeAudio'),musicBtn=document.getElementById('musicBtn'),musicText=document.getElementById('musicText');musicBtn.onclick=async()=>{try{if(audio.paused){await audio.play();musicText.textContent='主題曲播放中，切到相簿也不會斷';musicBtn.textContent='Ⅱ'}else{audio.pause();musicText.textContent='已暫停';musicBtn.textContent='♪'}}catch(e){musicText.textContent='瀏覽器需要你再點一次播放'}};
const street=document.getElementById('streetView'),wheel=document.getElementById('wheelView'),mainTitle=document.getElementById('mainTitle');document.getElementById('photoEntry').onclick=()=>{street.classList.add('hidden');wheel.classList.remove('hidden');mainTitle.textContent='回憶摩天輪';say('同檔切換：音樂不會中斷')};document.getElementById('backStreet').onclick=()=>{wheel.classList.add('hidden');street.classList.remove('hidden');mainTitle.textContent='富宜路街道'};
const albums=[['愛的旅程','記錄我們一起走過的每個重要時刻。每一張照片，都是愛的證明。','#63c6b9','#224b57'],['童年時光','把那些天真、可愛、還沒有長大的瞬間，一格一格收進摩天輪裡。','#ff9db6','#7d394a'],['家庭聚會','家人坐在一起的畫面，永遠最溫暖。','#ffcb69','#8b5221'],['旅行記憶','一起走過的路，不只是地圖上的距離。','#b98cff','#4a386f'],['知心好友','謝謝你們也把他放在心上。','#87d986','#275d35'],['寵物日記','陪伴過日常的小生命，也一起走進了回憶裡。','#70c9ff','#234d69'],['思念長輩','想念會慢慢沉下來，變成溫柔的光。','#f0a85a','#6d351c'],['成長足跡','每一個階段都值得被記住。','#6aa7ff','#273f78']];
const stage=document.getElementById('stage'),cabins=document.getElementById('cabins'),spokes=document.getElementById('spokes'),toast=document.getElementById('toast');let cur=0;for(let i=0;i<20;i++){let e=document.createElement('i');e.style.transform=`rotate(${i*18}deg)`;spokes.appendChild(e)}albums.forEach((a,i)=>{let b=document.createElement('button');b.className='cabin';b.innerHTML=`<div class="photo" style="background:linear-gradient(135deg,${a[2]},${a[3]})">${a[0]}</div><div class="label">${a[0]} ♡</div>`;b.onclick=()=>{if(i!==cur){cur=i;render();say('車廂移到下方入口')}else openAlbum(i)};cabins.appendChild(b)});function render(){const bs=[...document.querySelectorAll('.cabin')],w=stage.offsetWidth||760,r=w*.34;bs.forEach((b,i)=>{let off=i-cur,ang=(off/bs.length)*Math.PI*2+Math.PI/2,x=Math.cos(ang)*r,y=Math.sin(ang)*r,front=Math.sin(ang),active=i===cur;b.classList.toggle('active',active);b.style.transform=`translate(${x}px,${y}px) scale(${active?1.22:Math.max(.72,.84+front*.08)})`;b.style.opacity=active?1:Math.max(.34,.55+front*.18);b.style.filter=`blur(${active?0:Math.max(0,1.1-front)}px)`;b.style.zIndex=active?66:Math.round(20+front*10)});document.getElementById('infoTitle').textContent=albums[cur][0];document.getElementById('infoText').textContent=albums[cur][1]}function openAlbum(i){document.getElementById('modalTitle').textContent=albums[i][0];document.getElementById('modalDesc').textContent=albums[i][1];document.getElementById('grid').innerHTML=Array.from({length:6},(_,n)=>`<div class="pic" style="background:linear-gradient(135deg,${albums[i][2]},${albums[i][3]})">${albums[i][0]} ${n+1}</div>`).join('');document.getElementById('modal').classList.add('open')}document.getElementById('closeModal').onclick=()=>document.getElementById('modal').classList.remove('open');document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')e.currentTarget.classList.remove('open')};function say(s){toast.textContent=s;toast.classList.add('show');clearTimeout(say.t);say.t=setTimeout(()=>toast.classList.remove('show'),1300)}setInterval(()=>{if(!wheel.classList.contains('hidden')){cur=(cur+1)%albums.length;render()}},3600);render();
})();
</script>
</body>
</html>
