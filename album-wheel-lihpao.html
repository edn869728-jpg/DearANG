  <section class="mallArea"><div class="mallSign"><b>麗寶 OUTLET</b><small>LIHPAO OUTLET MALL</small></div><div class="mall"><article class="shop mid"><div class="dome"></div><h3>PHOTO SHOP</h3><div class="wins"><i></i><i></i></div></article><article class="shop tall"><h3>MICHAEL KORS</h3><div class="wins"><i></i><i></i></div></article><article class="shop center"><div class="dome"></div><h3>MEMORY PLAZA</h3><div class="arch"></div></article><article class="shop tall"><h3>COACH</h3><div class="wins"><i></i><i></i></div></article><article class="shop mid"><div class="dome"></div><h3>KTV TIME</h3><div class="wins"><i></i><i></i></div></article><div class="entryDeck"><button type="button" class="gateBtn">入口</button><button type="button" class="gateBtn">出口</button></div></div><div class="water"></div></section>
  <div class="modal" id="modal"><div class="sheet"><div class="modalHead"><div><h2 class="modalTitle" id="modalTitle">主題相簿</h2><p class="modalDesc" id="modalDesc"></p></div><button class="close" id="close">×</button></div><div class="grid" id="grid"></div></div></div><div class="toast" id="toast">已切換主題</div>
</main>
<script>
(()=>{
 const albums=[
  {title:'愛的旅程',short:'愛的旅程',icon:'📷',tone:['#63c6b9','#224b57'],text:['記錄我們一起走過的每個重要時刻，','從相遇、相戀到共同築起的未來。','每一張照片，都是愛的證明。'],slides:['01_我們的留影/cover.jpg','01_我們的留影/photo-01.jpg','01_我們的留影/photo-02.jpg']},
  {title:'童年時光',short:'童年時光',icon:'🌸',tone:['#ff9db6','#7d394a'],text:['有些笑容，是時間也帶不走的光。','把那些天真、可愛、還沒有長大的瞬間，','一格一格收進摩天輪裡。'],slides:['01_我們的留影/childhood-01.jpg','01_我們的留影/childhood-02.jpg','01_我們的留影/childhood-03.jpg']},
  {title:'家庭聚會',short:'家庭聚會',icon:'🏠',tone:['#ffcb69','#8b5221'],text:['家人坐在一起的畫面，永遠最溫暖。','那些吃飯、聊天、拍照、團聚的時刻，','都是回憶裡最亮的燈。'],slides:['04_好友們的回憶/family-01.jpg','04_好友們的回憶/family-02.jpg','04_好友們的回憶/family-03.jpg']},
  {title:'旅行記憶',short:'旅行記憶',icon:'🧳',tone:['#b98cff','#4a386f'],text:['一起走過的路，不只是地圖上的距離。','每一次出發、等待、抵達和回頭看，','都變成心裡不會消失的風景。'],slides:['02_我們的動腳回憶/travel-01.jpg','02_我們的動腳回憶/travel-02.jpg','02_我們的動腳回憶/travel-03.jpg']},
  {title:'知心好友',short:'知心好友',icon:'🤍',tone:['#87d986','#275d35'],text:['有些朋友不是常常說想念，','而是只要想起來，就會覺得心裡很滿。','謝謝你們也把他放在心上。'],slides:['04_好友們的回憶/friends-01.jpg','04_好友們的回憶/friends-02.jpg','04_好友們的回憶/friends-03.jpg']},
  {title:'寵物日記',short:'寵物日記',icon:'🐾',tone:['#70c9ff','#234d69'],text:['那些陪伴過日常的小生命，','也一起走進了我們的回憶裡。','牠們的眼神和靠近，都很珍貴。'],slides:['01_我們的留影/pet-01.jpg','01_我們的留影/pet-02.jpg','01_我們的留影/pet-03.jpg']},
  {title:'思念長輩',short:'思念長輩',icon:'🕯️',tone:['#f0a85a','#6d351c'],text:['有些愛不會因為時間變遠。','想念會慢慢沉下來，變成溫柔的光。','我們用照片，把那份牽掛留下。'],slides:['04_好友們的回憶/missing-01.jpg','04_好友們的回憶/missing-02.jpg','04_好友們的回憶/missing-03.jpg']},
  {title:'成長足跡',short:'成長足跡',icon:'🎓',tone:['#6aa7ff','#273f78'],text:['每一個階段都值得被記住。','那些努力、改變、跌倒又站起來的時候，','都讓今天的我們更靠近心裡的自己。'],slides:['01_我們的留影/growth-01.jpg','01_我們的留影/growth-02.jpg','01_我們的留影/growth-03.jpg']}
 ];
 const $=s=>document.querySelector(s),stage=$('#stage'),cabins=$('#cabins'),spokes=$('#spokes'),infoTitle=$('#infoTitle'),infoText=$('#infoText'),icon=$('#icon'),pic=$('#pic'),modal=$('#modal'),grid=$('#grid'),toast=$('#toast');let cur=0,tick=0,paused=false,timer=null,startX=0;
 for(let i=0;i<20;i++){const e=document.createElement('i');e.style.transform=`rotate(${i*18}deg)`;spokes.appendChild(e)}
 function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
 function svg(title,a,b,i){const x=`<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='${a}'/><stop offset='1' stop-color='${b}'/></linearGradient></defs><rect width='800' height='600' fill='url(#g)'/><circle cx='640' cy='120' r='70' fill='rgba(255,255,255,.18)'/><circle cx='130' cy='510' r='120' fill='rgba(0,0,0,.16)'/><text x='400' y='300' text-anchor='middle' dominant-baseline='middle' font-size='70' font-family='Microsoft JhengHei,Noto Sans TC,sans-serif' fill='rgba(255,247,225,.95)' font-weight='900'>${esc(title)}</text><text x='400' y='370' text-anchor='middle' font-size='28' fill='rgba(255,247,225,.72)' font-family='Arial'>MEMORY ${i}</text></svg>`;return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(x)}
 function setImg(img,src,a,i){img.style.opacity=0;img.onload=()=>img.style.opacity=1;img.onerror=()=>{img.onerror=null;img.src=svg(a.short,a.tone[0],a.tone[1],i+1)};img.src=src||svg(a.short,a.tone[0],a.tone[1],i+1)}
 albums.forEach((a,i)=>{const b=document.createElement('button');b.className='cabin';b.type='button';b.dataset.i=i;b.innerHTML=`<div class="photo"><span class="fallback" style="background:linear-gradient(135deg,${a.tone[0]},${a.tone[1]})">${a.short}</span><img alt="${a.title}"></div><div class="label">${a.short} ♡</div>`;b.onclick=()=>{if(i!==cur){cur=i;tick=0;pause();render();say('車廂移到下方開門口')}else open(i)};cabins.appendChild(b)});
 function render(){const bs=[...document.querySelectorAll('.cabin')],total=bs.length,w=stage.offsetWidth||760,r=w*.34;bs.forEach((b,i)=>{const a=albums[i],off=i-cur,ang=(off/total)*Math.PI*2+Math.PI/2,x=Math.cos(ang)*r,y=Math.sin(ang)*r,front=Math.sin(ang),active=i===cur,scale=active?1.22:Math.max(.72,.84+front*.08),op=active?1:Math.max(.32,.55+front*.18),blur=active?0:Math.max(0,1.1-front);b.classList.toggle('active',active);b.style.transform=`translate(${x}px,${y}px) scale(${scale})`;b.style.opacity=op;b.style.filter=`blur(${blur}px) brightness(${active?1.13:.86})`;b.style.zIndex=active?66:Math.round(20+front*10);const img=b.querySelector('img'),si=active?tick%a.slides.length:0,src=a.slides[si];if(img.dataset.src!==src){img.dataset.src=src;setImg(img,src,a,si)}});const a=albums[cur];infoTitle.textContent=a.title;icon.textContent=a.icon;infoText.innerHTML=a.text.map(esc).join('<br>');pic.style.background=`radial-gradient(circle at 72% 20%,rgba(255,250,190,.9) 0 10%,transparent 11%),linear-gradient(180deg,${a.tone[0]},${a.tone[1]} 55%,#160d12)`}
 function next(){cur=(cur+1)%albums.length;tick=0;render()}function prev(){cur=(cur-1+albums.length)%albums.length;tick=0;render()}function pause(){paused=true;clearTimeout(timer);timer=setTimeout(()=>paused=false,5200)}function say(s){toast.textContent=s;toast.classList.add('show');clearTimeout(say.t);say.t=setTimeout(()=>toast.classList.remove('show'),1200)}
 function open(i){const a=albums[i];$('#modalTitle').textContent=a.title;$('#modalDesc').textContent=a.text.join('');grid.innerHTML='';a.slides.concat(a.slides).slice(0,6).forEach((src,n)=>{const c=document.createElement('div');c.className='gcard';c.innerHTML=`<img alt="${a.title} ${n+1}"><span>${a.short} ${n+1}</span>`;setImg(c.querySelector('img'),src,a,n);grid.appendChild(c)});modal.classList.add('open');pause()}
 $('#next').onclick=()=>{next();pause()};$('#prev').onclick=()=>{prev();pause()};$('#close').onclick=()=>modal.classList.remove('open');modal.onclick=e=>{if(e.target===modal)modal.classList.remove('open')};$('#favBtn').onclick=()=>{say('已收藏目前主題');pause()};$('#menuBtn').onclick=()=>{say('這裡可以接你的主選單');pause()};document.querySelectorAll('.gateBtn').forEach(btn=>btn.onclick=()=>{say(btn.textContent+'在最下面了');pause()});addEventListener('resize',render);stage.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});stage.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-startX;if(Math.abs(d)>42){d<0?next():prev();pause()}},{passive:true});setInterval(()=>{if(!paused)next()},3600);setInterval(()=>{tick++;render()},1900);render();
})();
</script>
</body>
