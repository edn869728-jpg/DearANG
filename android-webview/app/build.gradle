plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dearang.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.dearang.app'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
