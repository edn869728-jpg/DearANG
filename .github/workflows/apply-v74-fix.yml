name: Apply DearANG v74 fix

on:
  push:
    branches:
      - fix/dearang-v74-opening-flow-20260705
    paths:
      - .github/workflows/apply-v74-fix.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject final stability script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          tag = '<script src="assets/js/dearang-v74-opening-flow.js?v=20260705"></script>'

          if tag not in text:
              head, marker, tail = text.rpartition('</body>')
              if not marker:
                  raise SystemExit('index.html has no closing </body> tag')
              text = head.rstrip() + '\n' + tag + '\n</body>' + tail
              index.write_text(text, encoding='utf-8')

          Path('.github/workflows/apply-v74-fix.yml').unlink()
          PY

      - name: Commit patched index
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/dearang-v74-opening-flow.js .github/workflows/apply-v74-fix.yml
          git commit -m "Fix DearANG opening to mini-world flow"
          git push origin "HEAD:${GITHUB_REF_NAME}"
