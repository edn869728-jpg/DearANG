name: Patch photo wheel entrance

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch index.html photo hotspot
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          old_hotspot = '<div class="hotspot h-photo" data-label="華光相館｜你和我們的時光" onclick="openPage(\'photo\')"></div>'
          new_hotspot = '<div class="hotspot h-photo" data-label="華光相館｜回憶摩天輪相簿" onclick="openAlbumWheelFromStreet(event)"></div>'
          if old_hotspot in s:
              s = s.replace(old_hotspot, new_hotspot)

          helper = """function openAlbumWheelFromStreet(event){
            if(event){event.preventDefault();event.stopPropagation();}
            try{playUiSound('open');}catch(e){}
            try{if(typeof sendPrivateVisitLog==='function')sendPrivateVisitLog('page_photo_wheel');}catch(e){}
            location.href='album-wheel-lihpao.html';
          }
          """
          if 'function openAlbumWheelFromStreet(event)' not in s:
              s = s.replace('function openPage(id){', helper + '\nfunction openPage(id){')

          # Safety fallback: even if inline onclick was cached/old, photo openPage redirects to wheel.
          fallback_old = "function openPage(id){\n  playUiSound('open');"
          fallback_new = "function openPage(id){\n  if(id==='photo'){openAlbumWheelFromStreet(null);return;}\n  playUiSound('open');"
          if fallback_old in s and "if(id==='photo'){openAlbumWheelFromStreet(null);return;}" not in s:
              s = s.replace(fallback_old, fallback_new)

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch if changed
        run: |
          if git diff --quiet index.html; then
            echo "index.html already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Route photo shop to album wheel page"
          git push
