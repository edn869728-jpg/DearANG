name: DearANG v127 issue trigger

on:
  issues:
    types: [opened]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: startsWith(github.event.issue.title, '[DearANG v127 trigger]')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repair workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dearang-v127-one-time-fix.yml --repo "${{ github.repository }}" --ref main
